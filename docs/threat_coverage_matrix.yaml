taxonomies:
  owasp_snapshot: OWASP Top 10 for LLM Applications 2025
  nist_ai_rmf_functions: [Govern, Map, Measure, Manage]
  iso_iec_42001_crosswalk:
    note: Crosswalk only; not a compliance claim.
  mitre_atlas_snapshot:
    name: MITRE ATLAS
    release: "2026.06"
    release_date: "2026-06-30"
    artifact_modified_date: "2026-05-27"
    format_version: "6.0.0"
    source: https://atlas.mitre.org/atlas-data/dist/v6/ATLAS-2026.06.yaml
    note: >
      Crosswalk only; maps local controls to ATLAS adversary tactics and
      techniques without claiming ATLAS coverage or validation. ATLAS uses
      richer strength, tactic, and technique fields because it is an adversary
      technique catalog; OWASP, NIST, and ISO remain tag-style review
      dimensions in this matrix.
controls:
  - id: runtime_success_required
    status: evaluated
    nist_ai_rmf: [Measure, Manage]
    iso_iec_42001_areas: [monitoring, accountability]
    owasp_risks: [LLM08]
    mitre_atlas:
      mapping_strength: adjacent
      tactics: [AML.TA0011]
      techniques: [AML.T0029]
    project_threats: [fixture-runtime-failure]
  - id: structured_output_required
    status: evaluated
    nist_ai_rmf: [Measure]
    iso_iec_42001_areas: [documentation, monitoring]
    owasp_risks: [LLM02]
    mitre_atlas:
      mapping_strength: not_applicable
      tactics: []
      techniques: []
    project_threats: [invalid-structured-record]
  - id: evidence_required
    status: evaluated
    nist_ai_rmf: [Measure, Govern]
    iso_iec_42001_areas: [transparency, documentation]
    owasp_risks: [LLM09]
    mitre_atlas:
      mapping_strength: partial
      tactics: [AML.TA0003, AML.TA0007]
      techniques: [AML.T0066, AML.T0067.000]
    project_threats: [missing-required-evidence]
  - id: material_claims_have_evidence
    status: evaluated
    nist_ai_rmf: [Measure, Govern]
    iso_iec_42001_areas: [transparency, accountability]
    owasp_risks: [LLM09]
    mitre_atlas:
      mapping_strength: partial
      tactics: [AML.TA0007]
      techniques: [AML.T0067.000]
    project_threats: [material-claim-link-regression]
  - id: tool_allowlist

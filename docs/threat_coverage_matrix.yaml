uncovered:
  - id: raw_payload_persistence_forbidden
    status: not_evaluated
    reason: Runset writers recursively redact persisted artifacts, but the project does not inspect storage outside agent-assure artifacts or provide production DLP.
    nist_ai_rmf: [Measure, Govern]
    mitre_atlas:
      mapping_strength: gap
      tactics: [AML.TA0010]
      techniques: [AML.T0024, AML.T0025, AML.T0057, AML.T0086]
  - id: live-adapter-attestation
    status: not_evaluated
    reason: Live adapters and providers are trusted producers; responses are not signed or independently attested.
    nist_ai_rmf: [Measure, Manage]
    mitre_atlas:
      mapping_strength: gap
      tactics: [AML.TA0003, AML.TA0006, AML.TA0007]
      techniques: [AML.T0010, AML.T0010.005, AML.T0109, AML.T0110]
  - id: live-stochastic-model-quality-regression
    status: not_evaluated
    reason: Fixture mode does not run live stochastic model comparisons.
    nist_ai_rmf: [Measure]
    mitre_atlas:
      mapping_strength: gap
      tactics: [AML.TA0011]
      techniques: [AML.T0031, AML.T0076]
  - id: context-discovery-and-stakeholder-impact-mapping
    status: not_evaluated
    reason: The project does not perform Map-function context discovery or impact mapping.
    nist_ai_rmf: [Map]
    mitre_atlas:
      mapping_strength: not_applicable
      tactics: []
      techniques: []
  - id: production-runtime-isolation
    status: not_evaluated
    reason: Offline run records do not observe production sandbox isolation.
    nist_ai_rmf: [Manage]
    mitre_atlas:
      mapping_strength: gap
      tactics: [AML.TA0005, AML.TA0011, AML.TA0012]
      techniques: [AML.T0050, AML.T0105, AML.T0112, AML.T0112.000]
  - id: safety-or-regulatory-certification
    status: not_evaluated
    reason: Deterministic fixture checks do not establish safety assurance or compliance status.
    nist_ai_rmf: [Govern]
    mitre_atlas:
      mapping_strength: not_applicable
      tactics: []
      techniques: []

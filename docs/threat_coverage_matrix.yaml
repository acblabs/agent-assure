    nist_ai_rmf: [Measure, Manage]
    iso_iec_42001_areas: [AI system lifecycle governance, monitoring]
    owasp_risks: [LLM06]
    mitre_atlas:
      mapping_strength: direct
      tactics: [AML.TA0005, AML.TA0009, AML.TA0010, AML.TA0012]
      techniques: [AML.T0053, AML.T0085.001, AML.T0086]

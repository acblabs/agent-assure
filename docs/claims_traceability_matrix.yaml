claims:
  - id: offline-fixture-mode
    claim: Runs deterministic fixture-mode suites offline against fixed local artifacts.
    evidence:
      schemas: [compiled-suite, fixture-manifest, agent-run-record, run-set]
      tests: [tests/integration/test_no_network.py, tests/integration/test_fixture_equivalence.py]
      docs: [README.md, docs/fixture_mode.md]
    limitations: Live providers, subprocess isolation, and catastrophic process-failure capture are outside the current fixture runner.
  - id: strict-schemas
    claim: Persisted artifacts use strict immutable Pydantic models.
    evidence:
      schemas: [agent-run-record, run-set, compiled-suite, fixture-manifest, span-plan]
      tests: [tests/unit/schema/test_strict_models.py]
      docs: [docs/schema_reference.md]
    limitations: Schema stability is pre-release and limited to v0.1.0 artifacts.
  - id: json-schema-parity
    claim: Runtime validation and exported JSON Schema agree on the parity corpus.
    evidence:
      tests: [tests/integration/test_schema_parity.py]
      commands: [agent-assure validate, agent-assure schema export]
    limitations: Parity corpus is intentionally small in the current implementation.
  - id: yaml-lexeme-preservation
    claim: YAML authoring preserves ambiguous semantic-string lexemes before conversion.
    evidence:
      tests: [tests/unit/authoring/test_yaml_loader.py]
      commands: [agent-assure suite lint, agent-assure suite compile]
    limitations: YAML remains an authoring format only.
  - id: canonical-digests
    claim: Digests pass through one projection and RFC 8785 JCS byte path.
    evidence:
      code: [src/agent_assure/canonical/digests.py]
      tests: [tests/unit/canonical/test_digests.py]
      docs: [docs/provenance_and_hashing.md, docs/digest_field_inventory.md]
    limitations: Hashes are provenance only, not behavioral verdicts.
  - id: hmac-sensitive-correlation
    claim: Sensitive low-entropy correlation examples use explicitly keyed HMAC-SHA256.
    evidence:
      code: [src/agent_assure/canonical/hmac_tokens.py]
      tests: [tests/unit/privacy/test_hmac_and_redaction.py]
    limitations: Tests inject a clearly marked non-production key; production callers must provide their own key.
  - id: privacy-redaction
    claim: Author-time summaries can be explicitly redacted before persistence, runset writes redact summary fields, raw sensitive summaries are verdict-bearing evaluation failures, and span-plan/report attributes are filtered before display.
    evidence:
      code: [src/agent_assure/privacy/redaction.py, src/agent_assure/runner/fixture_runner.py, src/agent_assure/telemetry/privacy_filter.py]
      tests: [tests/unit/privacy/test_hmac_and_redaction.py, tests/unit/runner/test_fixture_runner.py, tests/unit/telemetry/test_span_plan.py, tests/integration/test_baseline_passes.py]
    limitations: This is not production PHI de-identification.
  - id: otel-span-plan-preview
    claim: Structured records can be projected into an OpenTelemetry-aligned span plan.
    evidence:
      code: [src/agent_assure/telemetry/otel_mapping.py]
      tests: [tests/unit/telemetry/test_span_plan.py]
      docs: [docs/otel_alignment.md, docs/standards/otel_genai_gap_analysis.md]
    limitations: v0.1 emits no SDK spans and performs no OTLP export.
  - id: fixture-example-suites
    claim: The repository includes synthetic prior-authorization and minimal expense-approval fixture suites that run independently in fixture mode.
    evidence:
      code: [src/agent_assure/examples/prior_auth_synthetic/runner.py, src/agent_assure/examples/expense_approval_minimal/runner.py]
      tests: [tests/integration/test_offline_suite.py, tests/integration/test_expense_approval_minimal.py]
      docs: [examples/prior_auth_synthetic/README.md, examples/expense_approval_minimal/README.md]
    limitations: These examples are deterministic demonstrations, not live benchmarks or model-quality evaluations.
  - id: evidence-refactor-regression
    claim: The prior-authorization evidence refactor candidate preserves ordinary one-source evidence links while exposing a shared-source multi-claim evidence-linking regression.
    evidence:
      code: [src/agent_assure/examples/prior_auth_synthetic/app.py]
      tests: [tests/integration/test_evidence_regression.py]
      docs: [docs/measurement/blind_review_release_evidence.md]
    limitations: The regression is synthetic and fixture-bound; it does not measure clinical quality or live model behavior.
  - id: bundled-examples-api-boundary
    claim: Bundled example modules are installable for reproducible local demos but are not a stable extension API.
    evidence:
      code: [src/agent_assure/examples]
      tests: [tests/integration/test_offline_suite.py, tests/integration/test_expense_approval_minimal.py]
      docs: [docs/api_surface.md, docs/architecture.md, README.md]
    limitations: A stable adapter or plugin API is outside the current release surface.
  - id: expectation-evaluator-reports
    claim: Deterministic RunSet evaluation checks compiled expectations and built-in fixture controls, then writes JSON, Markdown, and Rich console reports.
    evidence:
      code: [src/agent_assure/evaluation/evaluator.py, src/agent_assure/policies, src/agent_assure/reporting]
      tests: [tests/unit/evaluation/test_evaluator.py, tests/integration/test_evaluate_reports.py]
      commands: [agent-assure evaluate]
      docs: [docs/cli_contract.md, docs/expectation_authoring.md]
    limitations: Reports explain deterministic governance verdicts only; they are not model interpretability, safety, compliance, or live quality evidence.
  - id: comparison-reports
    claim: RunSet comparison checks fixture equivalence, classifies deterministic baseline-to-candidate control changes, and reports provenance differences separately from verdicts.
    evidence:
      code: [src/agent_assure/compare/runsets.py, src/agent_assure/compare/invariant_diff.py, src/agent_assure/compare/provenance_diff.py, src/agent_assure/reporting]
      tests: [tests/unit/compare/test_runsets.py, tests/integration/test_compare_reports.py]
      commands: [agent-assure compare]
      docs: [docs/cli_contract.md, docs/invariant_diffing.md]
    limitations: Comparison is fixture-bound and does not measure stochastic model quality, live provider behavior, safety, or compliance.
  - id: evidence-packets-ci-gates
    claim: Evidence packets bundle deterministic report summaries with interpretation guidance, environment provenance, dependency-inventory digest, release manifest, and input digests; CI gates provide full/fail-fast report modes and stable pass/fail/invalid exit codes over candidate RunSets, summaries, and packets.
    evidence:
      schemas: [evidence-packet, environment-info, release-artifact-manifest, release-digest-replay]
      code: [src/agent_assure/reporting/packet.py, src/agent_assure/reporting/environment.py, src/agent_assure/ci.py, src/agent_assure/release_evidence.py, src/agent_assure/cli/packet_cmd.py, src/agent_assure/cli/ci_cmd.py, src/agent_assure/cli/release_cmd.py]
      tests: [tests/integration/test_evidence_packet.py, tests/integration/test_ci_gate.py, tests/unit/release/test_release_evidence.py]
      commands: [agent-assure ci, agent-assure packet build, agent-assure ci gate, agent-assure release replay]
      docs: [docs/cli_contract.md, docs/evidence_packets.md, docs/release_evidence.md]
    limitations: Packet, dependency-inventory, manifest, and replay digests are reproducibility anchors; replay uses stable projections for environment-bearing review artifacts and remains separate from cryptographic signatures, standards-conformant SBOMs, or attestations.
  - id: signed-release-evidence
    claim: Release evidence blobs can be signed keylessly in GitHub Actions and verified against the exact workflow identity and blob bytes.
    evidence:
      code: [.github/workflows/evidence.yml, scripts/reproduce_release.py]
      tests: [tests/unit/release/test_release_evidence.py]
      commands: [cosign sign-blob, cosign verify-blob, agent-assure release replay]
      docs: [docs/release_evidence.md, README.md]
    limitations: Signatures verify exact bytes and workflow identity only; they do not certify safety, compliance, clinical validity, live model quality, or OpenTelemetry adoption.
  - id: flagship-showcase-demo
    claim: The documented flagship showcase reproduces a passing baseline and an evidence-normalization candidate that keeps the visible answer stable while failing a material evidence-link invariant.
    evidence:
      tests: [tests/integration/test_evidence_regression.py, tests/integration/test_compare_reports.py]
      commands: [agent-assure suite compile, agent-assure suite run, agent-assure evaluate, agent-assure compare]
      reports: [.tmp/showcase/evidence-report/evaluation-report.md, .tmp/showcase/comparison-report/comparison-report.md]
      docs: [README.md, docs/showcase.md, docs/measurement/nist_agentic_measurement_use_case.md]
    limitations: The showcase is synthetic, deterministic, and fixture-bound; artifact digests are reproducibility anchors, not signatures or release attestations.
  - id: publishable-review-artifacts
    claim: The repository includes public measurement, executive, technical-report, standards, and reproducibility artifacts aligned to deterministic fixture evidence.
    evidence:
      docs: [docs/measurement/nist_agentic_measurement_use_case.md, docs/measurement/executive_one_pager.md, docs/measurement/measurement_brief_abstract.md, paper/invariant_based_change_control.md, paper/invariant_based_change_control_abstract.md, paper/reproducibility_appendix.md, docs/limitations.md]
      tests: [tests/integration/test_showcase_demo.py, tests/integration/test_evidence_regression.py, tests/integration/test_compare_reports.py]
      commands: [agent-assure suite compile, agent-assure suite run, agent-assure evaluate, agent-assure compare, agent-assure ci, agent-assure packet build, agent-assure release replay]
    limitations: These artifacts are not peer review, safety certification, regulatory compliance, clinical validation, NIST endorsement, OpenTelemetry adoption, or standards acceptance.
  - id: standards-freshness-review
    claim: OpenTelemetry-facing documentation is tied to a documented freshness review, local compatibility lock, and mapping matrix, with upstream contribution deferred until SDK/export evidence exists.
    evidence:
      docs: [docs/standards/freshness_checklist.md, docs/standards/otel_genai_gap_analysis.md, docs/standards/otel_contribution_candidate.md, docs/standards/upstream_issue_inventory.md, docs/otel_alignment.md]
      code: [src/agent_assure/telemetry/otel_mapping.py, src/agent_assure/telemetry/privacy_filter.py]
      tests: [tests/unit/telemetry/test_span_plan.py]
      compat: [compat/otel_genai_semconv.lock, compat/otel_mapping_matrix.yaml]
    limitations: External OpenTelemetry conventions may change after the recorded review; the current implementation is a span-plan preview and does not emit SDK spans or OTLP telemetry.

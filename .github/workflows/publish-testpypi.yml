name: Publish to TestPyPI

on:
  workflow_dispatch:
    inputs:
      expected-version:
        description: "Expected package version in this ref; set explicitly, for example 0.4.2rc1."
        required: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"
  SOURCE_DATE_EPOCH: "1783036800"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps --no-build-isolation -e .
      - name: Validate expected package version
        env:
          EXPECTED_VERSION: ${{ inputs.expected-version }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_version_matches_tag.py "v${EXPECTED_VERSION}"
      - run: make schema-check
      - run: make release-check
      # actions/upload-artifact@v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-distributions
          path: dist/*

  testpypi-publish:
    name: Upload release to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agent-assure
    permissions:
      contents: read
      id-token: write
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps --no-build-isolation -e .
      # actions/download-artifact@v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: python-distributions
          path: dist
      - name: Verify downloaded TestPyPI package files
        env:
          EXPECTED_VERSION: ${{ inputs.expected-version }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_version_matches_tag.py "v${EXPECTED_VERSION}"
          make schema-check
          python -m twine check dist/*
          python scripts/check_wheel_contents.py --dist dist
          python scripts/smoke_install_wheel.py --dist dist
      - name: Publish package distributions to TestPyPI
        # pypa/gh-action-pypi-publish@v1.14.0
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/

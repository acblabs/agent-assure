name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps --no-build-isolation -e .
      - run: make release-check
      - run: python scripts/update_golden.py
  langgraph-smoke:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements-langgraph.lock
      - run: python -m pip install --no-deps --no-build-isolation .
      - run: pytest -q -p no:cacheprovider --basetemp .tmp/pytest tests/integration/test_langgraph_expense_assurance.py::test_langgraph_real_graph_stream_smoke
  adk-smoke:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-build-isolation ".[adk]"
      - run: pytest -q -p no:cacheprovider --basetemp .tmp/pytest tests/unit/adapters/test_adk_adapter.py::test_adk_adapter_reads_real_google_adk_event_when_available

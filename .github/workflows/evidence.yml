name: evidence
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  COSIGN_VERSION: "v3.0.6"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --require-hashes -r requirements.lock
      - run: pip install --no-deps --no-build-isolation -e .
      - name: Build release bundle
        run: >
          python scripts/build_release_bundle.py
          --out .tmp/release
          --write-digests .tmp/release/release-digest-replay.json
          --source-ref "${GITHUB_REF}"
      - name: Check release distributions
        run: |
          python -m twine check .tmp/release/dist/*
          python scripts/check_wheel_contents.py --dist .tmp/release/dist
          python scripts/smoke_install_wheel.py --dist .tmp/release/dist
      - name: Replay release digests
        run: >
          agent-assure release replay .tmp/release/release-digest-replay.json
          --artifact-root .
          --require-current-commit
      - name: Render span-plan preview
        run: agent-assure otel preview tests/fixtures/run_record.json --out .tmp/release/span-plan.json
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}
      - name: Sign release evidence blobs
        shell: bash
        run: |
          set -euo pipefail
          artifacts=(
            .tmp/release/reports/evidence-packet.json
            .tmp/release/reports/release-artifact-manifest.json
            .tmp/release/release-digest-replay.json
            .tmp/release/sbom.cdx.json
          )
          while IFS= read -r artifact; do
            artifacts+=("${artifact}")
          done < <(find .tmp/release/dist -type f ! -name '*.bundle' | sort)
          for artifact in "${artifacts[@]}"; do
            cosign sign-blob --yes --bundle "${artifact}.bundle" "${artifact}"
          done
      - name: Verify workflow identity signatures
        shell: bash
        run: |
          set -euo pipefail
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/evidence.yml@${GITHUB_REF}"
          issuer="https://token.actions.githubusercontent.com"
          verify_blob() {
            local artifact="$1"
            local attempt
            for attempt in 1 2 3 4 5; do
              echo "verifying ${artifact} for ${GITHUB_REPOSITORY} ${GITHUB_REF} ${GITHUB_SHA} (attempt ${attempt})"
              if cosign verify-blob "${artifact}" \
                --bundle "${artifact}.bundle" \
                --certificate-identity "${identity}" \
                --certificate-oidc-issuer "${issuer}" \
                --certificate-github-workflow-name "evidence" \
                --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
                --certificate-github-workflow-ref "${GITHUB_REF}" \
                --certificate-github-workflow-sha "${GITHUB_SHA}" \
                --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}"; then
                return 0
              fi
              sleep "$((attempt * 2))"
            done
            return 1
          }
          artifacts=(
            .tmp/release/reports/evidence-packet.json
            .tmp/release/reports/release-artifact-manifest.json
            .tmp/release/release-digest-replay.json
            .tmp/release/sbom.cdx.json
          )
          while IFS= read -r artifact; do
            artifacts+=("${artifact}")
          done < <(find .tmp/release/dist -type f ! -name '*.bundle' | sort)
          for artifact in "${artifacts[@]}"; do
            verify_blob "${artifact}"
          done
      - name: Assert modified packet verification fails
        shell: bash
        run: |
          set -euo pipefail
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/evidence.yml@${GITHUB_REF}"
          issuer="https://token.actions.githubusercontent.com"
          packet=.tmp/release/reports/evidence-packet.json
          packet_bundle="${packet}.bundle"
          modified_packet=.tmp/release/reports/evidence-packet.modified.json
          cp "${packet}" "${modified_packet}"
          printf '\nmodified\n' >> "${modified_packet}"
          if cosign verify-blob "${modified_packet}" \
            --bundle "${packet_bundle}" \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer "${issuer}" \
            --certificate-github-workflow-name "evidence" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_SHA}" \
            --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}"; then
            echo "modified packet unexpectedly verified"
            exit 1
          fi
          rm -f "${modified_packet}"
      - name: Upload signed release evidence
        uses: actions/upload-artifact@v4
        with:
          name: agent-assure-release-evidence
          path: .tmp/release

  reproduce:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --require-hashes -r requirements.lock
      - run: pip install --no-deps --no-build-isolation -e .
      - uses: actions/download-artifact@v4
        with:
          name: agent-assure-release-evidence
          path: .tmp/published
      - name: Replay published digests from a fresh checkout
        run: >
          python scripts/build_release_bundle.py
          --out .tmp/release
          --write-digests .tmp/release/release-digest-replay.actual.json
          --source-ref "${GITHUB_REF}"
      - name: Assert distribution artifacts are byte-reproducible
        run: >
          python scripts/assert_dist_reproducible.py
          .tmp/published/reports/release-artifact-manifest.json
          .tmp/release/reports/release-artifact-manifest.json
          --require-distributions
      - name: Verify published replay file
        run: >
          agent-assure release replay .tmp/published/release-digest-replay.json
          --artifact-root .
          --expect-ref "${GITHUB_REF}"
          --require-current-commit

name: evidence
on: [workflow_dispatch]
jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - uses: ./.github/actions/agent-assure
        with:
          suite: examples/prior_auth_synthetic/suite.yaml
          baseline-variant: examples/prior_auth_synthetic/variants/baseline.yaml
          candidate-variant: examples/prior_auth_synthetic/variants/candidate_evidence_normalization.yaml
          out-dir: .tmp/release
          report-mode: full
      - run: agent-assure otel preview tests/fixtures/run_record.json --out .tmp/release/span-plan.json

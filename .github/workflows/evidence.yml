name: evidence
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  COSIGN_VERSION: "v3.0.6"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --require-hashes -r requirements.lock
      - run: pip install --no-deps --no-build-isolation -e .
      - name: Build release bundle
        run: >
          python scripts/build_release_bundle.py
          --out .tmp/release
          --write-digests .tmp/release/release-digest-replay.json
          --source-ref "${GITHUB_REF}"
      - name: Check release distributions
        run: |
          python -m twine check .tmp/release/dist/*
          python scripts/check_wheel_contents.py --dist .tmp/release/dist
          python scripts/smoke_install_wheel.py --dist .tmp/release/dist
      - name: Replay release digests
        run: >
          agent-assure release replay .tmp/release/release-digest-replay.json
          --artifact-root .
          --require-current-commit
      - name: Render span-plan preview
        run: agent-assure otel preview tests/fixtures/run_record.json --out .tmp/release/span-plan.json
      - name: Install cosign
        # sigstore/cosign-installer@v4.0.0
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}
      - name: Sign release evidence blobs
        run: >
          python scripts/cosign_release_artifacts.py sign
          --release-dir .tmp/release
          --workflow-name evidence
          --workflow-path .github/workflows/evidence.yml
      - name: Verify workflow identity signatures
        run: >
          python scripts/cosign_release_artifacts.py verify
          --release-dir .tmp/release
          --workflow-name evidence
          --workflow-path .github/workflows/evidence.yml
      - name: Assert modified packet verification fails
        run: >
          python scripts/cosign_release_artifacts.py verify-modified-fails
          --release-dir .tmp/release
          --workflow-name evidence
          --workflow-path .github/workflows/evidence.yml
      - name: Upload signed release evidence
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-assure-release-evidence
          path: .tmp/release

  reproduce:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --require-hashes -r requirements.lock
      - run: pip install --no-deps --no-build-isolation -e .
      # actions/download-artifact@v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: agent-assure-release-evidence
          path: .tmp/published
      - name: Replay published digests from a fresh checkout
        run: >
          python scripts/build_release_bundle.py
          --out .tmp/release
          --write-digests .tmp/release/release-digest-replay.actual.json
          --source-ref "${GITHUB_REF}"
      - name: Assert distribution artifacts are byte-reproducible
        run: >
          python scripts/assert_dist_reproducible.py
          .tmp/published/reports/release-artifact-manifest.json
          .tmp/release/reports/release-artifact-manifest.json
          --require-distributions
      - name: Verify published replay file
        run: >
          agent-assure release replay .tmp/published/release-digest-replay.json
          --artifact-root .
          --expect-ref "${GITHUB_REF}"
          --require-current-commit

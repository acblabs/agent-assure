name: release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  COSIGN_VERSION: "v3.0.6"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      bundle_name: ${{ steps.release-labels.outputs.bundle_name }}
    permissions:
      contents: write
      id-token: write
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Resolve release labels
        id: release-labels
        shell: bash
        run: |
          set -euo pipefail
          safe_ref_name="${GITHUB_REF_NAME//\//-}"
          bundle_name="agent-assure-${safe_ref_name}-release-bundle"
          notes_file="docs/release_notes/${GITHUB_REF_NAME}.md"
          echo "RELEASE_BUNDLE_NAME=${bundle_name}" >> "${GITHUB_ENV}"
          echo "RELEASE_NOTES_FILE=${notes_file}" >> "${GITHUB_ENV}"
          echo "bundle_name=${bundle_name}" >> "${GITHUB_OUTPUT}"
      - run: pip install --require-hashes -r requirements.lock
      - run: pip install --no-deps --no-build-isolation -e .
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_version_matches_tag.py "${GITHUB_REF_NAME}"
          version="${GITHUB_REF_NAME#v}"
          grep -Fq "## ${version} -" CHANGELOG.md
      - run: python scripts/check_docs_alignment.py
      - run: ruff check .
      - run: mypy src
      - run: pytest
      - run: python scripts/update_golden.py
      - run: make schema-check
      - name: Build release bundle
        run: >
          python scripts/build_release_bundle.py
          --out .tmp/release
          --write-digests .tmp/release/release-digest-replay.json
          --source-ref "${GITHUB_REF}"
      - name: Check release distributions
        run: |
          python -m twine check .tmp/release/dist/*
          python scripts/check_wheel_contents.py --dist .tmp/release/dist
          python scripts/smoke_install_wheel.py --dist .tmp/release/dist
      - name: Replay release digests
        run: >
          agent-assure release replay .tmp/release/release-digest-replay.json
          --artifact-root .
          --expect-ref "${GITHUB_REF}"
          --require-current-commit
      - name: Install cosign
        # sigstore/cosign-installer@v4.0.0
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}
      - name: Sign release bundle
        shell: bash
        run: |
          set -euo pipefail
          artifacts=(
            .tmp/release/reports/evidence-packet.json
            .tmp/release/reports/release-artifact-manifest.json
            .tmp/release/release-digest-replay.json
            .tmp/release/sbom.cdx.json
          )
          while IFS= read -r artifact; do
            artifacts+=("${artifact}")
          done < <(find .tmp/release/dist -type f ! -name '*.bundle' | sort)
          for artifact in "${artifacts[@]}"; do
            cosign sign-blob --yes --bundle "${artifact}.bundle" "${artifact}"
          done
      - name: Verify release bundle signatures
        shell: bash
        run: |
          set -euo pipefail
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}"
          issuer="https://token.actions.githubusercontent.com"
          verify_blob() {
            local artifact="$1"
            local attempt
            for attempt in 1 2 3 4 5; do
              echo "verifying ${artifact} for ${GITHUB_REPOSITORY} ${GITHUB_REF} ${GITHUB_SHA} (attempt ${attempt})"
              if cosign verify-blob "${artifact}" \
                --bundle "${artifact}.bundle" \
                --certificate-identity "${identity}" \
                --certificate-oidc-issuer "${issuer}" \
                --certificate-github-workflow-name "release" \
                --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
                --certificate-github-workflow-ref "${GITHUB_REF}" \
                --certificate-github-workflow-sha "${GITHUB_SHA}" \
                --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}"; then
                return 0
              fi
              sleep "$((attempt * 2))"
            done
            return 1
          }
          artifacts=(
            .tmp/release/reports/evidence-packet.json
            .tmp/release/reports/release-artifact-manifest.json
            .tmp/release/release-digest-replay.json
            .tmp/release/sbom.cdx.json
          )
          while IFS= read -r artifact; do
            artifacts+=("${artifact}")
          done < <(find .tmp/release/dist -type f ! -name '*.bundle' | sort)
          for artifact in "${artifacts[@]}"; do
            verify_blob "${artifact}"
          done
      - name: Upload release bundle artifact
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.release-labels.outputs.bundle_name }}
          path: .tmp/release
      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            .tmp/release/reports/evidence-packet.json
            .tmp/release/reports/evidence-packet.json.bundle
            .tmp/release/reports/evidence-packet.md
            .tmp/release/reports/release-artifact-manifest.json
            .tmp/release/reports/release-artifact-manifest.json.bundle
            .tmp/release/release-digest-replay.json
            .tmp/release/release-digest-replay.json.bundle
            .tmp/release/sbom.cdx.json
            .tmp/release/sbom.cdx.json.bundle
          )
          while IFS= read -r artifact; do
            assets+=("${artifact}")
            assets+=("${artifact}.bundle")
          done < <(find .tmp/release/dist -type f ! -name '*.bundle' | sort)
          if [ ! -f "${RELEASE_NOTES_FILE}" ]; then
            echo "release notes file is missing: ${RELEASE_NOTES_FILE}"
            exit 1
          fi
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "agent-assure ${GITHUB_REF_NAME}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          fi
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber

  pypi-publish:
    name: Upload release to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-assure
    permissions:
      contents: read
      id-token: write
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps --no-build-isolation -e .
      # actions/download-artifact@v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ needs.build.outputs.bundle_name }}
          path: .tmp/release
      - name: Verify downloaded release bundle
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_version_matches_tag.py "${GITHUB_REF_NAME}"
          agent-assure release replay .tmp/release/release-digest-replay.json \
            --artifact-root . \
            --expect-ref "${GITHUB_REF}" \
            --require-current-commit
      - name: Stage PyPI package files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp .tmp/release/dist/*.whl .tmp/release/dist/*.tar.gz dist/
          ls -l dist
      - name: Verify staged PyPI package files
        shell: bash
        run: |
          set -euo pipefail
          python -m twine check dist/*
          python scripts/check_wheel_contents.py --dist dist
          python scripts/smoke_install_wheel.py --dist dist
      - name: Publish signed-bundle distributions to PyPI
        # pypa/gh-action-pypi-publish@v1.14.0
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist

name: agent-assure
description: Compile, run, evaluate, packetize, gate, and upload deterministic assurance reports.
inputs:
  suite:
    description: Suite YAML path.
    required: true
  candidate-variant:
    description: Candidate variant YAML path.
    required: true
  baseline-variant:
    description: Optional baseline variant YAML path for comparison.
    required: false
    default: ""
  out-dir:
    description: Output directory for compiled artifacts, runsets, reports, packet, dependency inventory, and manifest.
    required: false
    default: .tmp/agent-assure
  report-mode:
    description: Report mode passed to agent-assure ci.
    required: false
    default: full
  upload-name:
    description: GitHub artifact upload name.
    required: false
    default: agent-assure-reports
  upload-reports:
    description: Upload reports even when the gate fails.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Compile suite
      shell: bash
      env:
        AGENT_ASSURE_ACTION_OUT_DIR: ${{ inputs.out-dir }}
        AGENT_ASSURE_ACTION_SUITE: ${{ inputs.suite }}
      run: |
        set -euo pipefail
        mkdir -p "${AGENT_ASSURE_ACTION_OUT_DIR}"
        agent-assure suite compile "${AGENT_ASSURE_ACTION_SUITE}" \
          --out "${AGENT_ASSURE_ACTION_OUT_DIR}/suite.compiled.json" \
          --manifest "${AGENT_ASSURE_ACTION_OUT_DIR}/fixtures.json"
    - name: Run baseline
      if: inputs.baseline-variant != ''
      shell: bash
      env:
        AGENT_ASSURE_ACTION_BASELINE_VARIANT: ${{ inputs.baseline-variant }}
        AGENT_ASSURE_ACTION_OUT_DIR: ${{ inputs.out-dir }}
      run: |
        set -euo pipefail
        agent-assure suite run "${AGENT_ASSURE_ACTION_OUT_DIR}/suite.compiled.json" \
          --variant "${AGENT_ASSURE_ACTION_BASELINE_VARIANT}" \
          --manifest "${AGENT_ASSURE_ACTION_OUT_DIR}/fixtures.json" \
          --out "${AGENT_ASSURE_ACTION_OUT_DIR}/baseline.runset.json"
    - name: Run candidate
      shell: bash
      env:
        AGENT_ASSURE_ACTION_CANDIDATE_VARIANT: ${{ inputs.candidate-variant }}
        AGENT_ASSURE_ACTION_OUT_DIR: ${{ inputs.out-dir }}
      run: |
        set -euo pipefail
        agent-assure suite run "${AGENT_ASSURE_ACTION_OUT_DIR}/suite.compiled.json" \
          --variant "${AGENT_ASSURE_ACTION_CANDIDATE_VARIANT}" \
          --manifest "${AGENT_ASSURE_ACTION_OUT_DIR}/fixtures.json" \
          --out "${AGENT_ASSURE_ACTION_OUT_DIR}/candidate.runset.json"
    - name: Evaluate and gate
      shell: bash
      env:
        AGENT_ASSURE_ACTION_BASELINE_VARIANT: ${{ inputs.baseline-variant }}
        AGENT_ASSURE_ACTION_OUT_DIR: ${{ inputs.out-dir }}
        AGENT_ASSURE_ACTION_REPORT_MODE: ${{ inputs.report-mode }}
      run: |
        set -euo pipefail
        args=(
          agent-assure ci "${AGENT_ASSURE_ACTION_OUT_DIR}/candidate.runset.json"
          --suite "${AGENT_ASSURE_ACTION_OUT_DIR}/suite.compiled.json"
          --out-dir "${AGENT_ASSURE_ACTION_OUT_DIR}/reports"
          --report-mode "${AGENT_ASSURE_ACTION_REPORT_MODE}"
        )
        if [ -n "${AGENT_ASSURE_ACTION_BASELINE_VARIANT}" ]; then
          args+=(--baseline "${AGENT_ASSURE_ACTION_OUT_DIR}/baseline.runset.json")
        fi
        "${args[@]}"
    - name: Upload reports
      if: always() && inputs.upload-reports == 'true'
      # actions/upload-artifact@v4
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: ${{ inputs.upload-name }}
        path: ${{ inputs.out-dir }}
